<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>二维码测试页面</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: #f5f5f5;
        }
        .test-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
            padding: 20px;
        }
        .test-card {
            border: 1px solid #ddd;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            background: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .qr-code {
            width: 150px;
            height: 150px;
            margin: 10px auto;
            border: 1px solid #eee;
            padding: 5px;
            background: white;
        }
        .word-info {
            margin-top: 10px;
            font-family: monospace;
            font-size: 11px;
            color: #666;
            text-align: left;
            background: #f9f9f9;
            padding: 8px;
            border-radius: 5px;
        }
        h1 {
            text-align: center;
            color: #333;
        }
        .instructions {
            background: #e8f4f8;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            border-left: 5px solid #3498db;
        }
    </style>
</head>
<body>
    <h1>🔍 二维码测试页面</h1>
    
    <div class="instructions">
        <h3>测试说明：</h3>
        <p>1. 用微信扫描二维码测试跳转到小程序</p>
        <p>2. 二维码内容格式：<code>pages/wordok/index?word={编码后的英文单词}</code></p>
        <p>3. 点击二维码可以查看完整的路径</p>
        <p>4. 确保已在微信公众平台配置二维码跳转规则</p>
    </div>
    
    <div class="test-container">
        <div class="test-card">
            <h3>watermelon</h3>
            <div style="color: #666; font-size: 12px; margin-bottom: 5px;">西瓜</div>
            <img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAIQAAACEAQAAAAB5P74KAAABJklEQVR4nM2WUWrEQAxD5bD/8g32/sfKDeQTqNj7tW0/Wg+UTiCYgRGW/TxJGO+rrk8bwN/uRESiAhmvcKtDG5mOwoT7DCNxM0hkh0dOCZT021Nfd+ImCzrQgWlTlAVOuNMJx9ia1aW+dzoPvEAMFidccgiTpFtCdNvb6gCUYIiAta0PTIJqT5aErc4DChfKQKLo7VygrXRWmujAl4chdakPdB5IZzAIp+unp67v8iENiY0zvO87+02itfZzcTU35i3i2VgfzKlAqGs9MK59iV0Va3wdzAUbHbfOK7t1v9wINT/sZ81P9KDmEy5k1f5eZafDu+I5I7/vF9id59wgB/z0miKntefnmnc2zZVzfax13NlUpACW1vVBfy8aIpF7nuOf/bd8ACg6utQXKEXqAAAAAElFTkSuQmCC" class="qr-code" 
                 onclick="showQRPath('watermelon', 'watermelon')">
            <div class="word-info">
                <div><strong>原始:</strong> watermelon</div>
                <div><strong>编码:</strong> watermelon</div>
                <div><strong>安全名:</strong> watermelon</div>
                <div><strong>JSON文件:</strong> watermelon.json</div>
                <div><strong>音频文件:</strong> watermelon.mp3</div>
            </div>
        </div>
    </div>
    
    <script>
        function showQRPath(original, encoded) {
            const path = `pages/wordok/index?word=${encoded}`;
            alert(`二维码路径：\n${path}\n\n原始单词：${original}\n编码后：${encoded}`);
        }
        
        // 添加点击事件到所有二维码图片
        document.querySelectorAll('.qr-code').forEach(img => {
            img.style.cursor = 'pointer';
        });
    </script>
</body>
</html>
