<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poker‑ABC Flashcards</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #fafafa;
            margin: 0;
            padding: 0;
        }

        header {
            text-align: center;
            padding: 30px 10px;
            background: #ffcc66;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        h1 {
            margin: 0;
            font-size: 32px;
        }

        p.subtitle {
            margin: 8px 0 0;
            font-size: 16px;
            color: #444;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 20px;
            padding: 30px;
            max-width: 900px;
            margin: auto;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            text-decoration: none;
            color: #333;
            border: 2px solid #eee;
            transition: 0.2s;
        }

        .card:hover {
            border-color: #ff9900;
            background: #fff7e6;
            transform: translateY(-3px);
        }

        .flag {
            font-size: 40px;
            margin-bottom: 10px;
        }

        footer {
            text-align: center;
            padding: 20px;
            color: #777;
            font-size: 14px;
        }
    </style>
</head>
<body>

<header>
    <h1>Poker‑ABC Flashcards</h1>
    <p class="subtitle">Multilingual Early‑Learning Playing‑Card Style Flashcards</p>
</header>

<div class="grid">

    <!-- English‑Chinese -->
    <a class="card" href="english-chinese/index.html">
        <div class="flag">🇬🇧🇨🇳</div>
        <div>English‑Chinese</div>
    </a>

    <!-- Japanese‑Chinese -->
    <a class="card" href="japanese-chinese/index.html">
        <div class="flag">🇯🇵🇨🇳</div>
        <div>Japanese‑Chinese</div>
    </a>

    <!-- French‑Chinese -->
    <a class="card" href="french-chinese/index.html">
        <div class="flag">🇫🇷🇨🇳</div>
        <div>French‑Chinese</div>
    </a>

    <!-- Spanish‑Chinese -->
    <a class="card" href="spanish-chinese/index.html">
        <div class="flag">🇪🇸🇨🇳</div>
        <div>Spanish‑Chinese</div>
    </a>

    <!-- Korean‑Chinese -->
    <a class="card" href="korean-chinese/index.html">
        <div class="flag">🇰🇷🇨🇳</div>
        <div>Korean‑Chinese</div>
    </a>

</div>

<footer>
    © 2026 Poker‑ABC Project · Personal use free · Commercial license required
</footer>

</body>
</html>
